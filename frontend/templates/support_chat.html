<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крипто Хаб</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ===== ПЛАВАЮЩАЯ КНОПКА ЧАТА ===== */
        .chat-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--pink);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: var(--pink-glow-strong);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .chat-button:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
        }

        .chat-button .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            border: 2px solid white;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 0, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 255, 0);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== ОКНО ЧАТА ===== */
        .chat-window {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 380px;
            height: 550px;
            background: var(--black);
            border: 2px solid var(--pink);
            border-radius: 20px;
            box-shadow: var(--pink-glow-strong);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            animation: slideIn 0.3s ease;
        }

        .chat-window.open {
            display: flex;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Шапка чата */
        .chat-header {
            background: var(--pink);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .chat-header h3 {
            color: var(--black);
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse-dot 1.5s infinite;
        }

        .status-dot.waiting {
            background: orange;
        }

        .status-dot.offline {
            background: gray;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-close {
            background: none;
            border: none;
            color: var(--black);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: transform 0.3s;
        }

        .chat-close:hover {
            transform: scale(1.2);
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messagePop 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes messagePop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .client-message {
            align-self: flex-end;
            background: var(--pink);
            color: var(--black);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid var(--pink);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .operator-message {
            align-self: flex-start;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            align-self: center;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            max-width: 90%;
            text-align: center;
        }

        .message-sender {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--pink);
        }

        .operator-message .message-sender {
            color: #00ff00;
        }

        .message-time {
            font-size: 9px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        /* Индикатор печатания */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            align-self: flex-start;
            background: rgba(255, 0, 255, 0.1);
            border-radius: 18px;
            margin: 5px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--pink);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Нижняя панель */
        .chat-footer {
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(255, 0, 255, 0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 12px;
            color: white;
            font-size: 14px;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: var(--pink-glow);
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-button {
            background: var(--pink);
            color: var(--black);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: var(--pink-glow-strong);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Быстрые ответы */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 0, 255, 0.2);
        }

        .quick-reply-btn {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid var(--pink);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .quick-reply-btn:hover {
            background: var(--pink);
            color: var(--black);
        }

        /* Приветствие */
        .welcome-message {
            text-align: center;
            color: var(--text-dim);
            padding: 30px 20px;
        }

        .welcome-message .pink {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Основной контент страницы (ваш существующий контент) -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="pink">КРИПТО</span> ХАБ
            </div>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/dashboard">Статистика</a>
                <a href="/">Услуги</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Добро пожаловать в Крипто Хаб</h1>
        <p>Ваш надежный партнер в мире криптовалют</p>
    </div>

    <!-- Кнопка чата -->
    <button class="chat-button" id="chatButton" onclick="toggleChat()">
        💬
        <span class="notification-badge" id="notificationBadge" style="display: none;">1</span>
    </button>

    <!-- Окно чата -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header" id="chatHeader">
            <h3>ЧАТ ПОДДЕРЖКИ</h3>
            <div class="status" id="chatStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">AI Ассистент</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">×</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <span class="pink">💬</span>
                Здравствуйте! Я AI-ассистент.<br>
                <small>Чем могу помочь?</small>
            </div>
        </div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="Введите сообщение..."
                    onkeypress="if(event.key === 'Enter') sendMessage()"
                >
                <button class="send-button" onclick="sendMessage()" id="sendButton">
                    ➔
                </button>
            </div>
            <div class="quick-replies" id="quickReplies">
                <button class="quick-reply-btn" onclick="sendQuickMessage('Статус заказа')">📦 Статус</button>
                <button class="quick-reply-btn" onclick="sendQuickMessage('Пополнение')">💰 Пополнение</button>
                <button class="quick-reply-btn" onclick="sendQuickMessage('Вывод')">💸 Вывод</button>
                <button class="quick-reply-btn" onclick="sendQuickMessage('Оператор')">👤 Оператор</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let sessionId = null;
        let isConnected = false;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        const clientId = localStorage.getItem('userId') || null;

        // Переключение чата
        function toggleChat() {
            const chatWindow = document.getElementById('chatWindow');
            const chatButton = document.getElementById('chatButton');

            chatWindow.classList.toggle('open');

            if (chatWindow.classList.contains('open') && !ws) {
                connectWebSocket();
            }
        }

        // Подключение к WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/v1/support/client${clientId ? '?client_id=' + clientId : ''}`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = function() {
                    console.log('✅ Подключено к чату');
                    isConnected = true;
                    reconnectAttempts = 0;
                    updateStatus('connected');
                    addSystemMessage('Соединение установлено. Чем могу помочь?');
                };

                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };

                ws.onclose = function() {
                    console.log('❌ Отключено от чата');
                    isConnected = false;
                    updateStatus('disconnected');

                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        setTimeout(connectWebSocket, 3000);
                    }
                };

                ws.onerror = function(error) {
                    console.error('WebSocket ошибка:', error);
                };
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Обновление статуса
        function updateStatus(status) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (status === 'connected') {
                statusDot.className = 'status-dot';
                statusText.textContent = 'AI Ассистент';
            } else if (status === 'waiting') {
                statusDot.className = 'status-dot waiting';
                statusText.textContent = 'Ожидание оператора';
            } else if (status === 'operator') {
                statusDot.className = 'status-dot';
                statusDot.style.background = '#00ff00';
                statusText.textContent = 'Оператор онлайн';
            } else {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Нет соединения';
            }
        }

        // Обработка сообщений
        function handleMessage(data) {
            console.log('Получено:', data);

            hideTypingIndicator();

            if (data.type === 'transfer_to_human') {
                updateStatus('waiting');
                addSystemMessage('🔄 Ищу свободного оператора...');
            }
            else if (data.type === 'operator_connected') {
                updateStatus('operator');
                addSystemMessage('👤 Оператор подключился');
            }
            else if (data.type === 'operator_message') {
                addMessage(data.message, 'operator');
            }
            else if (data.type === 'ai' || data.type === 'answer' || data.type === 'greeting' || data.type === 'status') {
                addMessage(data.message, 'ai');

                if (data.suggestions && data.suggestions.length > 0) {
                    updateQuickReplies(data.suggestions);
                }
            }
            else if (data.type === 'unknown' || data.type === 'error') {
                addMessage(data.message, 'ai');

                if (data.suggestions && data.suggestions.length > 0) {
                    updateQuickReplies(data.suggestions);
                }
            }
        }

        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || !isConnected) return;

            addMessage(message, 'client');
            ws.send(message);
            input.value = '';
            showTypingIndicator();
            removeWelcome();
        }

        function sendQuickMessage(message) {
            document.getElementById('chatInput').value = message;
            sendMessage();
        }

        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            removeWelcome();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            const time = new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let sender = '';
            if (type === 'client') sender = '<div class="message-sender">Вы</div>';
            else if (type === 'ai') sender = '<div class="message-sender">🤖 AI</div>';
            else if (type === 'operator') sender = '<div class="message-sender">👤 Оператор</div>';

            messageDiv.innerHTML = `
                ${sender}
                <div>${text}</div>
                <div class="message-time">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeWelcome() {
            const messagesDiv = document.getElementById('chatMessages');
            const welcome = messagesDiv.querySelector('.welcome-message');
            if (welcome) welcome.remove();
        }

        function updateQuickReplies(suggestions) {
            const repliesDiv = document.getElementById('quickReplies');
            repliesDiv.innerHTML = '';

            suggestions.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.textContent = text;
                btn.onclick = () => sendQuickMessage(text);
                repliesDiv.appendChild(btn);
            });
        }

        function showTypingIndicator() {
            hideTypingIndicator();

            const messagesDiv = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Перетаскивание окна чата
        const chatWindow = document.getElementById('chatWindow');
        const chatHeader = document.getElementById('chatHeader');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        chatHeader.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;

            if (e.target === chatHeader || e.target.parentNode === chatHeader) {
                isDragging = true;
            }
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();

                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;

                xOffset = currentX;
                yOffset = currentY;

                setTranslate(currentX, currentY, chatWindow);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }

        function dragEnd() {
            isDragging = false;
        }
    </script>
</body>
</html>
