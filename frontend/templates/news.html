<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости - Крипто Хаб</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .news-section {
            padding: 100px 0 60px;
        }

        .news-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .news-header h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink);
            box-shadow: var(--pink-glow);
        }

        .news-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .news-card-content {
            padding: 20px;
        }

        .news-category {
            display: inline-block;
            background: rgba(255, 0, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--pink);
            margin-bottom: 12px;
        }

        .news-card-title {
            font-size: 20px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .news-card-title a {
            color: white;
            text-decoration: none;
        }

        .news-card-title a:hover {
            color: var(--pink);
        }

        .news-summary {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
        }

        .news-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .news-views {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .read-more {
            color: var(--pink);
            text-decoration: none;
            font-size: 14px;
        }

        .read-more:hover {
            text-shadow: var(--pink-glow);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn.active {
            background: var(--pink);
            color: black;
            border-color: var(--pink);
        }

        .page-btn:hover:not(.active) {
            background: rgba(255, 0, 255, 0.2);
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .no-news {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--pink);
            color: black;
            border-color: var(--pink);
        }

        .filter-btn:hover:not(.active) {
            background: rgba(255, 0, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="overlay"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="pink">КРИПТО</span> ХАБ
            </div>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/news" class="active">Новости</a>
                <a href="/dashboard">Статистика</a>
            </div>
            <div class="nav-buttons">
                <button class="btn-glow" onclick="openLoginModal()">ВОЙТИ</button>
                <a href="/register" class="btn-primary">РЕГИСТРАЦИЯ</a>
                <a href="/chat" class="chat-nav-button">ЧАТЫ</a>
            </div>
        </div>
    </nav>

    <section class="news-section">
        <div class="container">
            <div class="news-header">
                <h1>НОВОСТИ <span class="pink">КРИПТО ХАБ</span></h1>
                <p>Актуальные новости, обновления и аналитика</p>
            </div>

            <div class="category-filter" id="categoryFilter"></div>

            <div class="news-grid" id="newsGrid">
                <div class="loader">Загрузка новостей...</div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-copyright">© 2024 Крипто Хаб</div>
                <div class="footer-links">
                    <a href="/">Главная</a>
                    <a href="/news">Новости</a>
                    <a href="/dashboard">Статистика</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let currentPage = 0;
        let currentCategory = '';
        const limit = 6;

        async function loadCategories() {
            try {
                const response = await fetch('/api/v1/news/categories');
                const categories = await response.json();

                const filterDiv = document.getElementById('categoryFilter');
                filterDiv.innerHTML = `
                    <button class="filter-btn ${currentCategory === '' ? 'active' : ''}" data-category="">Все</button>
                    ${categories.map(cat => `
                        <button class="filter-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>
                    `).join('')}
                `;

                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentCategory = btn.dataset.category;
                        currentPage = 0;
                        loadNews();
                        loadCategories();
                    });
                });
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }

        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loader">Загрузка новостей...</div>';

            try {
                let url = `/api/v1/news?skip=${currentPage * limit}&limit=${limit}`;
                if (currentCategory) {
                    url += `&category=${currentCategory}`;
                }

                const response = await fetch(url);
                const news = await response.json();

                if (news.length === 0 && currentPage === 0) {
                    grid.innerHTML = '<div class="no-news">📭 Новостей пока нет</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                grid.innerHTML = news.map(item => `
                    <div class="news-card">
                        ${item.image_url ? `<img src="${item.image_url}" class="news-card-image" alt="${item.title}">` : '<div class="news-card-image"></div>'}
                        <div class="news-card-content">
                            <span class="news-category">${item.category || 'Новость'}</span>
                            <h3 class="news-card-title">
                                <a href="/news/${item.id}">${escapeHtml(item.title)}</a>
                            </h3>
                            <p class="news-summary">${escapeHtml(item.summary || item.content.substring(0, 150))}...</p>
                            <div class="news-meta">
                                <span class="news-date">📅 ${formatDate(item.created_at)}</span>
                                <span class="news-views">👁️ ${item.views}</span>
                                <a href="/news/${item.id}" class="read-more">Читать →</a>
                            </div>
                        </div>
                    </div>
                `).join('');

                updatePagination();

            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                grid.innerHTML = '<div class="no-news">❌ Ошибка загрузки новостей</div>';
            }
        }

        async function updatePagination() {
            try {
                let url = `/api/v1/news?limit=1000`;
                if (currentCategory) {
                    url += `&category=${currentCategory}`;
                }
                const response = await fetch(url);
                const allNews = await response.json();
                const totalPages = Math.ceil(allNews.length / limit);

                const paginationDiv = document.getElementById('pagination');
                if (totalPages <= 1) {
                    paginationDiv.innerHTML = '';
                    return;
                }

                let pagesHtml = '';
                for (let i = 0; i < totalPages; i++) {
                    pagesHtml += `<button class="page-btn ${currentPage === i ? 'active' : ''}" data-page="${i}">${i + 1}</button>`;
                }
                paginationDiv.innerHTML = pagesHtml;

                document.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentPage = parseInt(btn.dataset.page);
                        loadNews();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                });
            } catch (error) {
                console.error('Ошибка пагинации:', error);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Добавляем виджет последних новостей на главную
        async function loadLatestNews() {
            const widget = document.getElementById('latest-news-widget');
            if (!widget) return;

            try {
                const response = await fetch('/api/v1/news/latest?limit=3');
                const news = await response.json();

                widget.innerHTML = news.map(item => `
                    <div class="news-widget-item">
                        <a href="/news/${item.id}" class="news-widget-link">
                            <div class="news-widget-title">${escapeHtml(item.title)}</div>
                            <div class="news-widget-date">${formatDate(item.created_at)}</div>
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки виджета:', error);
            }
        }

        // Загрузка при старте
        loadCategories();
        loadNews();
        loadLatestNews();
    </script>

<script src="/static/js/main.js"></script>


</body>
</html>
